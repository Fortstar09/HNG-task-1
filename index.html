<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #f3f4f6;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 0 15px;
      }

      .card {
        width: 100%;
        max-width: 520px;
        background: #fff;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .priority {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #ffe9e3;
        color: #ff5a1f;
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
      }

      .date {
        font-size: 13px;
        color: #777;
      }

      h2 {
        margin: 15px 0 5px;
        font-size: 18px;
      }

      .completed {
        text-decoration: line-through;
        color: #aaa;
      }

      .desc {
        font-size: 14px;
        color: #666;
      }

      .tags {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      .tag {
        border: 1px solid #ddd;
        padding: 5px 10px;
        border-radius: 6px;
        font-size: 12px;
        color: #555;
      }

      .time {
        font-size: 12px;
        color: #888;
        margin-top: 10px;
      }

      .divider {
        border-top: 1px dashed #eee;
        margin: 16px 0;
      }

      .bottom {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .status {
        font-size: 12px;
        padding: 5px 10px;
        border-radius: 6px;
        background: #eef2ff;
        color: #4f46e5;
      }

      .status.done {
        background: #e6f9ec;
        color: #16a34a;
      }

      /* Custom Checkbox */
      .checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        font-size: 12px;
      }

      .checkbox input {
        display: none;
      }

      .custom-checkbox {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid #ccc;
        display: inline-block;
        position: relative;
        transition: all 0.2s ease;
      }

      .checkbox input:checked + .custom-checkbox {
        background: #4f46e5;
        border-color: #4f46e5;
      }

      .custom-checkbox::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 6px;
        height: 10px;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: translate(-50%, -60%) rotate(45deg);
        opacity: 0;
      }

      .checkbox input:checked + .custom-checkbox::after {
        opacity: 1;
      }

      .checkbox:hover .custom-checkbox {
        border-color: #4f46e5;
      }

      .checkbox input:focus + .custom-checkbox {
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
      }

      .actions {
        display: flex;
        justify-content: space-between;
        gap: 24px;
        margin-top: 20px;
      }

      button {
        padding: 6px 10px;
        border-radius: 6px;
        width: 100%;
        padding: 8px 16px;
        border: 1px solid #ddd;
        background: #f9fafb;
        cursor: pointer;
        font-size: 12px;
      }

      button:focus {
        outline: 2px solid #333;
      }

      .delete {
        color: white;
        background-color: red;
      }
    </style>
  </head>

  <body>
    <article class="card" data-testid="test-todo-card">
      <!-- Top -->
      <div class="top">
        <span class="priority" data-testid="test-todo-priority">🚩 High</span>

        <label class="checkbox">
          <input
            type="checkbox"
            data-testid="test-todo-complete-toggle"
            id="checkbox"
          />
          <span class="custom-checkbox"></span>
          <span>Done</span>
        </label>
      </div>

      <!-- Title -->
      <h2 data-testid="test-todo-title" id="title">
        Create comprehensive wireframe
      </h2>

      <!-- Description -->
      <p class="desc" data-testid="test-todo-description">
        Discuss with UX Designer to develop the concept into a clear and
        effective wireframe.
      </p>

      <!-- Tags -->
      <div class="tags" data-testid="test-todo-tags" role="list">
        <span class="tag" data-testid="test-todo-tag-work"># Design</span>
        <span class="tag" data-testid="test-todo-tag-urgent"># UI</span>
        <span class="tag"># Product</span>
      </div>

      <!-- Time Remaining -->
      <div class="time">
        <time
          data-testid="test-todo-time-remaining"
          id="timeRemaining"
          aria-live="polite"
        ></time>
      </div>

      <div class="divider"></div>

      <!-- Bottom -->
      <div class="bottom">
        <span class="status" data-testid="test-todo-status" id="status">
          In Progress
        </span>

        <time class="date" data-testid="test-todo-due-date" id="dueDate"></time>
      </div>

      <!-- Buttons -->
      <div class="actions">
        <button data-testid="test-todo-edit-button" onclick="editTask()">
          Edit
        </button>

        <button
          class="delete"
          data-testid="test-todo-delete-button"
          onclick="deleteTask()"
        >
          Delete
        </button>
      </div>
    </article>

    <script>
      const dueDate = new Date(Date.now() + 1000 * 60 * 60 * 24 * 2);

      const dueDateEl = document.getElementById("dueDate");
      const timeEl = document.getElementById("timeRemaining");
      const checkbox = document.getElementById("checkbox");
      const title = document.getElementById("title");
      const status = document.getElementById("status");

      function formatDate(date) {
        return "Due " + date.toDateString();
      }

      function getRemaining() {
        const now = new Date();
        const diff = dueDate - now;

        const minutes = Math.floor(diff / (1000 * 60));
        const hours = Math.floor(diff / (1000 * 60 * 60));
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));

        if (diff <= 0) return "Due now!";
        if (days > 1) return `Due in ${days} days`;
        if (days === 1) return "Due tomorrow";
        if (hours > 1) return `Due in ${hours} hours`;
        return `Due in ${minutes} minutes`;
      }

      function updateTime() {
        timeEl.textContent = getRemaining();
      }

      dueDateEl.textContent = formatDate(dueDate);
      updateTime();
      setInterval(updateTime, 60000);

      checkbox.addEventListener("change", () => {
        if (checkbox.checked) {
          title.classList.add("completed");
          status.textContent = "Done";
          status.classList.add("done");
        } else {
          title.classList.remove("completed");
          status.textContent = "In Progress";
          status.classList.remove("done");
        }
      });

      function editTask() {
        console.log("edit clicked");
      }

      function deleteTask() {
        alert("Delete clicked");
      }
    </script>
  </body>
</html>
