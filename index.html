<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: #f3f4f6;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 0 15px;
      }

      .card {
        width: 100%;
        max-width: 520px;
        background: #fff;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
        transition: border-color 0.2s ease;
      }

      /* Priority border indicator */
      .card.priority-high {
        border-left: 4px solid #ff5a1f;
      }

      .card.priority-medium {
        border-left: 4px solid #f59e0b;
      }

      .card.priority-low {
        border-left: 4px solid #10b981;
      }

      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
      }

      .priority {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #ffe9e3;
        color: #ff5a1f;
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
      }

      .priority.medium {
        background: #fef3c7;
        color: #b45309;
      }

      .priority.low {
        background: #d1fae5;
        color: #065f46;
      }

      .priority-indicator {
        display: inline-block;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        margin-right: 4px;
      }

      .priority-indicator.high {
        background-color: #ff5a1f;
      }

      .priority-indicator.medium {
        background-color: #f59e0b;
      }

      .priority-indicator.low {
        background-color: #10b981;
      }

      .date {
        font-size: 13px;
        color: #777;
      }

      h2 {
        margin: 15px 0 5px;
        font-size: 18px;
        transition: color 0.2s ease;
      }

      .completed {
        text-decoration: line-through;
        color: #aaa;
      }

      .desc {
        font-size: 14px;
        color: #666;
        max-height: 60px;
        overflow: hidden;
        transition: max-height 0.3s ease;
      }

      .desc.expanded {
        max-height: none;
      }

      .expand-toggle {
        background: none;
        border: none;
        color: #4f46e5;
        cursor: pointer;
        font-size: 12px;
        padding: 4px 0;
        margin-top: 8px;
        text-decoration: underline;
        transition: color 0.2s ease;
      }

      .expand-toggle:hover {
        color: #4338ca;
      }

      .expand-toggle:focus {
        outline: 2px solid #4f46e5;
        outline-offset: 2px;
      }

      .collapsible-section {
        overflow: hidden;
      }

      .tags {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 12px;
      }

      .tag {
        border: 1px solid #ddd;
        padding: 5px 10px;
        border-radius: 6px;
        font-size: 12px;
        color: #555;
      }

      .time {
        font-size: 12px;
        color: #888;
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .overdue-indicator {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 6px;
        background-color: #fee2e2;
        color: #991b1b;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
      }

      .divider {
        border-top: 1px dashed #eee;
        margin: 16px 0;
      }

      .bottom {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
      }

      .status-control {
        font-size: 12px;
        padding: 5px 10px;
        border-radius: 6px;
        border: 1px solid #ddd;
        background: #f9fafb;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .status-control:hover {
        border-color: #4f46e5;
        background: #f3f4f6;
      }

      .status-control:focus {
        outline: 2px solid #4f46e5;
        outline-offset: 2px;
        border-color: #4f46e5;
      }

      .status {
        font-size: 12px;
        padding: 5px 10px;
        border-radius: 6px;
        background: #eef2ff;
        color: #4f46e5;
        font-weight: 500;
      }

      .status.done {
        background: #e6f9ec;
        color: #16a34a;
      }

      .status.pending {
        background: #fef3c7;
        color: #b45309;
      }

      .status.in-progress {
        background: #eef2ff;
        color: #4f46e5;
      }

      /* Custom Checkbox */
      .checkbox {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        font-size: 12px;
      }

      .checkbox input {
        display: none;
      }

      .custom-checkbox {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid #ccc;
        display: inline-block;
        position: relative;
        transition: all 0.2s ease;
      }

      .checkbox input:checked + .custom-checkbox {
        background: #4f46e5;
        border-color: #4f46e5;
      }

      .custom-checkbox::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 6px;
        height: 10px;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: translate(-50%, -60%) rotate(45deg);
        opacity: 0;
      }

      .checkbox input:checked + .custom-checkbox::after {
        opacity: 1;
      }

      .checkbox:hover .custom-checkbox {
        border-color: #4f46e5;
      }

      .checkbox input:focus + .custom-checkbox {
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
      }

      .actions {
        display: flex;
        justify-content: space-between;
        gap: 24px;
        margin-top: 20px;
      }

      button {
        padding: 8px 16px;
        border-radius: 6px;
        width: 100%;
        border: 1px solid #ddd;
        background: #f9fafb;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s ease;
      }

      button:hover {
        background: #f3f4f6;
        border-color: #ccc;
      }

      button:focus {
        outline: 2px solid #4f46e5;
        outline-offset: 2px;
      }

      .delete {
        color: white;
        background-color: #ef4444;
      }

      .delete:hover {
        background-color: #dc2626;
      }

      /* Modal Styles */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .modal-overlay.active {
        display: flex;
      }

      .modal {
        background: white;
        border-radius: 12px;
        padding: 28px;
        width: 100%;
        max-width: 500px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }

      .modal-header h3 {
        margin: 0;
        font-size: 20px;
        color: #1f2937;
      }

      .modal-close {
        background: none;
        border: none;
        font-size: 24px;
        cursor: pointer;
        color: #6b7280;
        padding: 0;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: color 0.2s ease;
      }

      .modal-close:hover {
        color: #1f2937;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #374151;
        margin-bottom: 6px;
      }

      .form-group input,
      .form-group textarea,
      .form-group select {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-family: inherit;
        font-size: 14px;
        transition: border-color 0.2s ease;
      }

      .form-group input:focus,
      .form-group textarea:focus,
      .form-group select:focus {
        outline: none;
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
      }

      .form-group textarea {
        resize: vertical;
        min-height: 100px;
      }

      .form-actions {
        display: flex;
        gap: 12px;
        margin-top: 28px;
      }

      .form-actions button {
        flex: 1;
        margin: 0;
      }

      .form-actions .save-btn {
        background: #4f46e5;
        color: white;
        border-color: #4f46e5;
      }

      .form-actions .save-btn:hover {
        background: #4338ca;
        border-color: #4338ca;
      }

      .form-actions .cancel-btn {
        background: #e5e7eb;
        color: #374151;
      }

      .form-actions .cancel-btn:hover {
        background: #d1d5db;
      }

      /* Responsive Design */
      @media (max-width: 768px) {
        .card {
          padding: 16px;
        }

        .top {
          flex-direction: column;
          align-items: flex-start;
        }

        .bottom {
          flex-direction: column;
          align-items: flex-start;
        }

        .actions {
          flex-direction: column;
          gap: 10px;
        }

        .form-group {
          margin-bottom: 16px;
        }

        .modal {
          padding: 20px;
        }
      }

      @media (max-width: 480px) {
        body {
          padding: 0 10px;
        }

        .card {
          padding: 12px;
        }

        h2 {
          font-size: 16px;
        }

        .modal-overlay {
          padding: 10px;
        }

        .modal {
          padding: 16px;
        }

        .modal-header h3 {
          font-size: 18px;
        }
      }
    </style>
  </head>

  <body>
    <!-- Modal Overlay -->
    <div
      class="modal-overlay"
      id="editModalOverlay"
      data-testid="test-todo-edit-modal"
    >
      <div class="modal">
        <div class="modal-header">
          <h3>Edit Todo</h3>
          <button
            class="modal-close"
            data-testid="test-todo-edit-modal-close"
            aria-label="Close edit modal"
            onclick="cancelEdit()"
          >
            ×
          </button>
        </div>

        <form
          id="editForm"
          data-testid="test-todo-edit-form"
          onsubmit="handleSave(event)"
        >
          <!-- Title Input -->
          <div class="form-group">
            <label for="editTitleInput">Title</label>
            <input
              type="text"
              id="editTitleInput"
              data-testid="test-todo-edit-title-input"
              placeholder="Enter task title"
              required
            />
          </div>

          <!-- Description Input -->
          <div class="form-group">
            <label for="editDescriptionInput">Description</label>
            <textarea
              id="editDescriptionInput"
              data-testid="test-todo-edit-description-input"
              placeholder="Enter task description"
            ></textarea>
          </div>

          <!-- Priority Select -->
          <div class="form-group">
            <label for="editPrioritySelect">Priority</label>
            <select
              id="editPrioritySelect"
              data-testid="test-todo-edit-priority-select"
              aria-label="Select task priority"
            >
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
          </div>

          <!-- Due Date Input -->
          <div class="form-group">
            <label for="editDueDateInput">Due Date</label>
            <input
              type="date"
              id="editDueDateInput"
              data-testid="test-todo-edit-due-date-input"
            />
          </div>

          <!-- Form Actions -->
          <div class="form-actions">
            <button
              type="submit"
              class="save-btn"
              data-testid="test-todo-save-button"
            >
              Save
            </button>
            <button
              type="button"
              class="cancel-btn"
              data-testid="test-todo-cancel-button"
              onclick="cancelEdit()"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Main Card -->
    <article class="card" data-testid="test-todo-card" id="todoCard">
      <!-- Top -->
      <div class="top">
        <span
          class="priority"
          data-testid="test-todo-priority"
          id="priorityDisplay"
        >
          <span
            class="priority-indicator"
            data-testid="test-todo-priority-indicator"
            id="priorityIndicator"
          ></span>
          🚩 High
        </span>

        <label class="checkbox">
          <input
            type="checkbox"
            data-testid="test-todo-complete-toggle"
            id="checkbox"
            aria-label="Mark task as done"
          />
          <span class="custom-checkbox"></span>
          <span>Done</span>
        </label>
      </div>

      <!-- Title -->
      <h2 data-testid="test-todo-title" id="title">
        Create comprehensive wireframe
      </h2>

      <!-- Description -->
      <div
        class="collapsible-section"
        data-testid="test-todo-collapsible-section"
        id="collapsibleSection"
      >
        <p class="desc" data-testid="test-todo-description" id="description">
          Discuss with UX Designer to develop the concept into a clear and
          effective wireframe.
        </p>
      </div>

      <!-- Expand Toggle -->
      <button
        class="expand-toggle"
        data-testid="test-todo-expand-toggle"
        id="expandToggle"
        aria-expanded="false"
        aria-controls="collapsibleSection"
        style="display: none"
      >
        Show more
      </button>

      <!-- Tags -->
      <div class="tags" data-testid="test-todo-tags" role="list">
        <span class="tag" data-testid="test-todo-tag-work"># Design</span>
        <span class="tag" data-testid="test-todo-tag-urgent"># UI</span>
        <span class="tag"># Product</span>
      </div>

      <!-- Time Remaining -->
      <div class="time">
        <time
          data-testid="test-todo-time-remaining"
          id="timeRemaining"
          aria-live="polite"
        ></time>
        <span
          class="overdue-indicator"
          data-testid="test-todo-overdue-indicator"
          id="overdueIndicator"
          style="display: none"
        >
          ⚠️ Overdue
        </span>
      </div>

      <div class="divider"></div>

      <!-- Bottom -->
      <div class="bottom">
        <select
          class="status-control"
          data-testid="test-todo-status-control"
          id="statusControl"
          aria-label="Task status"
          onchange="handleStatusChange()"
        >
          <option value="Pending">Pending</option>
          <option value="In Progress" selected>In Progress</option>
          <option value="Done">Done</option>
        </select>

        <time class="date" data-testid="test-todo-due-date" id="dueDate"></time>
      </div>

      <!-- Buttons -->
      <div class="actions">
        <button data-testid="test-todo-edit-button" onclick="openEdit()">
          Edit
        </button>

        <button
          class="delete"
          data-testid="test-todo-delete-button"
          onclick="deleteTask()"
        >
          Delete
        </button>
      </div>
    </article>

    <script>
      // State management
      let todoState = {
        title: "Create comprehensive wireframe",
        description:
          "Discuss with UX Designer to develop the concept into a clear and effective wireframe.",
        priority: "High",
        dueDate: new Date(Date.now() + 1000 * 60 * 60 * 24 * 2),
        status: "In Progress",
        isCompleted: false,
      };

      const MIN_DESC_HEIGHT = 60; // pixels

      // DOM Elements
      const card = document.getElementById("todoCard");
      const titleEl = document.getElementById("title");
      const descEl = document.getElementById("description");
      const collapsibleSection = document.getElementById("collapsibleSection");
      const expandToggle = document.getElementById("expandToggle");
      const dueDateEl = document.getElementById("dueDate");
      const timeEl = document.getElementById("timeRemaining");
      const overdueIndicator = document.getElementById("overdueIndicator");
      const checkbox = document.getElementById("checkbox");
      const priorityDisplay = document.getElementById("priorityDisplay");
      const statusControl = document.getElementById("statusControl");
      const modalOverlay = document.getElementById("editModalOverlay");
      const editForm = document.getElementById("editForm");
      const editTitleInput = document.getElementById("editTitleInput");
      const editDescriptionInput = document.getElementById(
        "editDescriptionInput",
      );
      const editPrioritySelect = document.getElementById("editPrioritySelect");
      const editDueDateInput = document.getElementById("editDueDateInput");

      // Helper Functions
      function formatDateForInput(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${year}-${month}-${day}`;
      }

      function formatDate(date) {
        return "Due " + date.toDateString();
      }

      // === EDIT MODE FUNCTIONS ===
      window.openEdit = function () {
        console.log("Opening edit modal");
        editTitleInput.value = todoState.title;
        editDescriptionInput.value = todoState.description;
        editPrioritySelect.value = todoState.priority;
        editDueDateInput.value = formatDateForInput(todoState.dueDate);
        modalOverlay.classList.add("active");
        editTitleInput.focus();
      };

      window.cancelEdit = function () {
        console.log("Canceling edit");
        modalOverlay.classList.remove("active");
        const editBtn = document.querySelector(
          '[data-testid="test-todo-edit-button"]',
        );
        if (editBtn) editBtn.focus();
      };

      window.handleSave = function (event) {
        console.log("Save button clicked");
        if (event) {
          event.preventDefault();
        }

        const title = editTitleInput.value.trim();
        if (!title) {
          alert("Please enter a title");
          editTitleInput.focus();
          return;
        }

        console.log("Saving with values:", {
          title: title,
          description: editDescriptionInput.value.trim(),
          priority: editPrioritySelect.value,
          dueDate: editDueDateInput.value,
        });

        todoState.title = title;
        todoState.description = editDescriptionInput.value.trim();
        todoState.priority = editPrioritySelect.value;

        if (editDueDateInput.value) {
          const dateStr = editDueDateInput.value;
          const [year, month, day] = dateStr.split("-");
          todoState.dueDate = new Date(year, parseInt(month) - 1, day);
        }

        updateCard();
        window.cancelEdit();
      };

      // === STATUS MANAGEMENT ===
      window.handleStatusChange = function () {
        const newStatus = statusControl.value;
        updateStatus(newStatus);
      };

      function updateStatus(newStatus) {
        todoState.status = newStatus;

        if (newStatus === "Done") {
          todoState.isCompleted = true;
          checkbox.checked = true;
        } else {
          todoState.isCompleted = false;
          checkbox.checked = false;
        }

        updateCard();
      }

      // === EXPAND / COLLAPSE ===
      function setupExpandToggle() {
        const descHeight = descEl.scrollHeight;
        const hasOverflow = descHeight > MIN_DESC_HEIGHT;

        if (hasOverflow) {
          expandToggle.style.display = "block";
          descEl.classList.remove("expanded");
          expandToggle.setAttribute("aria-expanded", "false");
          expandToggle.textContent = "Show more";
        } else {
          expandToggle.style.display = "none";
        }
      }

      // === TIME MANAGEMENT ===
      function getRemaining() {
        if (todoState.status === "Done") {
          return "Completed";
        }

        const now = new Date();
        const diff = todoState.dueDate - now;

        const minutes = Math.floor(diff / (1000 * 60));
        const hours = Math.floor(diff / (1000 * 60 * 60));
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));

        if (diff <= 0) {
          const absDays = Math.abs(days);
          const absHours = Math.abs(hours);
          const absMinutes = Math.abs(minutes);

          if (absDays > 0)
            return `Overdue by ${absDays} day${absDays > 1 ? "s" : ""}`;
          if (absHours > 0)
            return `Overdue by ${absHours} hour${absHours > 1 ? "s" : ""}`;
          return `Overdue by ${absMinutes} minute${absMinutes > 1 ? "s" : ""}`;
        }

        if (days > 1) return `Due in ${days} days`;
        if (days === 1) return "Due tomorrow";
        if (hours > 1) return `Due in ${hours} hours`;
        if (hours === 1) return "Due in 1 hour";
        return `Due in ${minutes} minute${minutes > 1 ? "s" : ""}`;
      }

      function isOverdue() {
        if (todoState.status === "Done") return false;
        return todoState.dueDate < new Date();
      }

      function updateTimeDisplay() {
        timeEl.textContent = getRemaining();

        if (isOverdue()) {
          overdueIndicator.style.display = "inline-flex";
        } else {
          overdueIndicator.style.display = "none";
        }
      }

      // === PRIORITY MANAGEMENT ===
      function updatePriorityDisplay() {
        const priority = todoState.priority;
        const emoji =
          priority === "Low" ? "✓" : priority === "Medium" ? "⚡" : "🚩";

        priorityDisplay.innerHTML = `
          <span
            class="priority-indicator ${priority.toLowerCase()}"
            data-testid="test-todo-priority-indicator"
          ></span>
          ${emoji} ${priority}
        `;

        card.className = "card";
        card.classList.add(`priority-${priority.toLowerCase()}`);
        priorityDisplay.className = `priority ${priority.toLowerCase()}`;
      }

      // === CARD UPDATE ===
      function updateCard() {
        console.log("Updating card with state:", todoState);

        titleEl.textContent = todoState.title;
        descEl.textContent = todoState.description;

        if (todoState.status === "Done") {
          titleEl.classList.add("completed");
        } else {
          titleEl.classList.remove("completed");
        }

        statusControl.value = todoState.status;
        updatePriorityDisplay();
        updateTimeDisplay();
        dueDateEl.textContent = formatDate(todoState.dueDate);
        setupExpandToggle();

        console.log("Card updated successfully");
      }

      window.deleteTask = function () {
        if (confirm("Are you sure you want to delete this task?")) {
          alert("Delete clicked");
        }
      };

      // Event Listeners
      editForm.addEventListener("submit", function (e) {
        console.log("Form submit event fired");
        e.preventDefault();
        window.handleSave();
      });

      checkbox.addEventListener("change", function () {
        if (checkbox.checked) {
          updateStatus("Done");
        } else {
          updateStatus("Pending");
        }
      });

      expandToggle.addEventListener("click", function () {
        const isExpanded =
          expandToggle.getAttribute("aria-expanded") === "true";
        if (isExpanded) {
          descEl.classList.remove("expanded");
          expandToggle.setAttribute("aria-expanded", "false");
          expandToggle.textContent = "Show more";
        } else {
          descEl.classList.add("expanded");
          expandToggle.setAttribute("aria-expanded", "true");
          expandToggle.textContent = "Show less";
        }
      });

      // Initialize
      function initialize() {
        updateCard();
        setupExpandToggle();
        updateTimeDisplay();
        setInterval(updateTimeDisplay, 30000);
      }

      // Start the app
      initialize();
    </script>
  </body>
</html>
